<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surya Portfolio</title>
    <style>
        /* CSS styling for Video Projects Section */
        .video-gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 16px;
            padding: 10px;
        }
        .video-item {
            position: relative;
            overflow: hidden;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }
        .video-item video {
            width: 100%;
            height: auto;
            display: block;
        }
        .video-title {
            text-align: center;
            font-size: 1.2em;
            margin-top: 8px;
        }
    </style>
</head>
<body>
    <header>
        <h1>Welcome to My Portfolio</h1>
    </header>
    <section class="video-projects">
        <h2>Video Projects</h2>
        <div class="video-gallery">
            <div class="video-item">
                <video controls>
                    <source src="video1.mp4" type="video/mp4">
                    Your browser does not support the video tag.
                </video>
                <div class="video-title">Project 1</div>
            </div>
            <div class="video-item">
                <video controls>
                    <source src="video2.mp4" type="video/mp4">
                    Your browser does not support the video tag.
                </video>
                <div class="video-title">Project 2</div>
            </div>
            <div class="video-item">
                <video controls>
                    <source src="video3.mp4" type="video/mp4">
                    Your browser does not support the video tag.
                </video>
                <div class="video-title">Project 3</div>
            </div>
            <!-- Add more video items as needed -->
        </div>
    </section>
</body>
</html>
